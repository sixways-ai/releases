name: Update Release Feed

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate feed from GitHub Releases
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const COMPONENTS = ['endpoint', 'server', 'gateway', 'ml-gateway', 'sandbox', 'vscode-extension'];
            const DOCKER_COMPONENTS = new Set(['server', 'gateway', 'ml-gateway', 'sandbox']);

            // Fetch all releases from GitHub API
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );

            // Parse tag to extract component and version
            // Supported formats:
            //   endpoint/v1.3.0       -> component=endpoint, version=1.3.0
            //   server/v1.3.0-beta.1  -> component=server, version=1.3.0-beta.1
            //   v1.0.0                -> component=endpoint (legacy backwards compat)
            function parseTag(tagName) {
              const prefixMatch = tagName.match(/^([a-z0-9-]+)\/v(.+)$/);
              if (prefixMatch) {
                const component = prefixMatch[1];
                if (COMPONENTS.includes(component)) {
                  return { component, version: prefixMatch[2] };
                }
              }
              // Legacy: bare vX.Y.Z tags are endpoint releases
              const legacyMatch = tagName.match(/^v(.+)$/);
              if (legacyMatch) {
                return { component: 'endpoint', version: legacyMatch[1] };
              }
              return null;
            }

            const feedReleases = [];
            const channelMap = {};
            const componentLatest = {};

            for (const rel of releases) {
              if (rel.draft) continue;

              const parsed = parseTag(rel.tag_name);
              if (!parsed) continue;

              const { component, version } = parsed;
              const channel = rel.prerelease ? 'beta' : 'stable';

              // Parse frontmatter from release body if present
              let metadata = {};
              let releaseNotes = rel.body || '';
              const frontmatterMatch = releaseNotes.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
              if (frontmatterMatch) {
                const ALLOWED_KEYS = new Set([
                  'urgency', 'min_version', 'containers',
                  'component', 'docker_image', 'docker_digest',
                  'vsix_url', 'helm_chart_version',
                ]);
                const SHA256_KEY_RE = /^sha256_[a-zA-Z0-9_]+$/;
                const lines = frontmatterMatch[1].split('\n');
                for (const line of lines) {
                  const kv = line.match(/^(\w[\w-]*):\s*(.+)$/);
                  if (kv) {
                    const key = kv[1];
                    if (ALLOWED_KEYS.has(key) || SHA256_KEY_RE.test(key)) {
                      metadata[key] = kv[2].trim();
                    }
                  }
                }
                releaseNotes = frontmatterMatch[2].trim();
              }

              // Build artifacts based on component type
              const artifacts = {};

              if (DOCKER_COMPONENTS.has(component)) {
                // Docker-based components: expect docker_image and docker_digest in frontmatter
                if (metadata.docker_image || metadata.docker_digest) {
                  artifacts.docker = {
                    image: metadata.docker_image || null,
                    digest: metadata.docker_digest || null,
                    size_bytes: null
                  };
                }
              } else if (component === 'vscode-extension') {
                // VS Code extension: expect vsix_url in frontmatter
                if (metadata.vsix_url) {
                  artifacts.vsix = {
                    url: metadata.vsix_url,
                    size_bytes: null
                  };
                }
              } else {
                // Endpoint and other binary-based components: parse release assets
                for (const asset of rel.assets) {
                  const info = parseAssetName(asset.name, version);
                  if (info) {
                    const key = `${info.platform}/${info.arch}/${info.artifact_type}`;
                    artifacts[key] = {
                      filename: asset.name,
                      download_url: asset.browser_download_url,
                      sha256: metadata[`sha256_${asset.name.replace(/[^a-zA-Z0-9]/g, '_')}`] || null,
                      size_bytes: asset.size,
                      content_type: asset.content_type
                    };
                  }
                }
              }

              // Build summary (first 200 chars of notes, strip markdown)
              const summary = releaseNotes
                .replace(/#{1,6}\s/g, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/[*_`]/g, '')
                .slice(0, 200)
                .trim();

              const releaseEntry = {
                component,
                version,
                channel,
                released_at: rel.published_at,
                update_urgency: metadata.urgency || 'recommended',
                release_notes_summary: summary || null,
                min_supported_version: metadata.min_version || null,
                artifacts,
                detail_url: `https://sixways-ai.github.io/releases/versions/${component}/${version}.json`
              };

              feedReleases.push(releaseEntry);

              // Track per-channel
              if (!channelMap[channel]) channelMap[channel] = [];
              channelMap[channel].push(releaseEntry);

              // Track per-component latest
              if (!componentLatest[component]) componentLatest[component] = {};
              const cl = componentLatest[component];
              if (!cl[channel] || new Date(rel.published_at) > new Date(cl[channel].released_at)) {
                cl[channel] = releaseEntry;
              }

              // Write per-version detail file
              const detail = {
                schema_version: 2,
                component,
                version,
                channel,
                released_at: rel.published_at,
                release_notes: releaseNotes,
                release_notes_summary: summary || null,
                min_supported_version: metadata.min_version || null,
                update_urgency: metadata.urgency || 'recommended',
                artifacts,
                helm_chart_version: metadata.helm_chart_version || null,
                github_release_url: rel.html_url
              };

              // Parse container images from frontmatter if present (legacy format)
              detail.container_images = [];
              if (metadata.containers) {
                const parts = metadata.containers.split(',');
                for (const part of parts) {
                  const match = part.trim().match(/^(\w+)=([^@]+)@(.+)$/);
                  if (match) {
                    const [, variant, imageRef, digest] = match;
                    const [registry, tag] = imageRef.split(':');
                    detail.container_images.push({
                      variant,
                      registry,
                      tag: tag || version,
                      digest
                    });
                  }
                }
              }

              const versionDir = path.join('versions', component);
              if (!fs.existsSync(versionDir)) {
                fs.mkdirSync(versionDir, { recursive: true });
              }
              fs.writeFileSync(
                path.join(versionDir, `${version}.json`),
                JSON.stringify(detail, null, 2) + '\n'
              );
            }

            // Sort by release date descending
            feedReleases.sort((a, b) =>
              new Date(b.released_at) - new Date(a.released_at)
            );

            // Write index.json
            const index = {
              schema_version: 2,
              updated_at: new Date().toISOString(),
              components: COMPONENTS,
              channels: ['stable', 'beta'],
              releases: feedReleases
            };
            fs.writeFileSync(
              path.join('index.json'),
              JSON.stringify(index, null, 2) + '\n'
            );

            // Write latest.json (latest per component per channel)
            const latestObj = {};
            for (const comp of COMPONENTS) {
              const cl = componentLatest[comp];
              if (cl) {
                const entry = cl.stable || cl.beta || null;
                latestObj[comp] = entry ? {
                  version: entry.version,
                  channel: entry.channel,
                  released_at: entry.released_at,
                  detail_url: entry.detail_url
                } : null;
              } else {
                latestObj[comp] = null;
              }
            }
            fs.writeFileSync(
              path.join('latest.json'),
              JSON.stringify({
                schema_version: 2,
                updated_at: new Date().toISOString(),
                latest: latestObj
              }, null, 2) + '\n'
            );

            // Write per-component latest.json files
            for (const comp of COMPONENTS) {
              const compDir = path.join('components', comp);
              if (!fs.existsSync(compDir)) {
                fs.mkdirSync(compDir, { recursive: true });
              }
              const cl = componentLatest[comp] || {};
              const compLatest = {
                schema_version: 2,
                component: comp,
                latest_stable: cl.stable ? {
                  version: cl.stable.version,
                  released_at: cl.stable.released_at,
                  detail_url: cl.stable.detail_url
                } : null,
                latest_beta: cl.beta ? {
                  version: cl.beta.version,
                  released_at: cl.beta.released_at,
                  detail_url: cl.beta.detail_url
                } : null
              };
              fs.writeFileSync(
                path.join(compDir, 'latest.json'),
                JSON.stringify(compLatest, null, 2) + '\n'
              );
            }

            // Write per-channel files
            for (const [channel, entries] of Object.entries(channelMap)) {
              entries.sort((a, b) =>
                new Date(b.released_at) - new Date(a.released_at)
              );
              const channelFile = {
                schema_version: 2,
                channel,
                latest_version: entries[0]?.version || null,
                releases: entries
              };
              fs.writeFileSync(
                path.join('channels', `${channel}.json`),
                JSON.stringify(channelFile, null, 2) + '\n'
              );
            }

            // Helper: parse asset filename to platform/arch/type
            function parseAssetName(name, version) {
              const n = name.toLowerCase();
              // macOS installer
              if (n.endsWith('.pkg')) {
                return { platform: 'macos', arch: 'universal', artifact_type: 'installer' };
              }
              // macOS binary (tar.gz)
              if (n.includes('macos') && n.endsWith('.tar.gz')) {
                const arch = n.includes('aarch64') || n.includes('arm64') ? 'aarch64' : 'x86_64';
                return { platform: 'macos', arch, artifact_type: 'binary' };
              }
              // Windows installer
              if (n.endsWith('.msi') || n.endsWith('.exe')) {
                const arch = n.includes('arm64') || n.includes('aarch64') ? 'aarch64' : 'x86_64';
                return { platform: 'windows', arch, artifact_type: 'installer' };
              }
              // Linux deb
              if (n.endsWith('.deb')) {
                const arch = n.includes('arm64') || n.includes('aarch64') ? 'aarch64' : 'x86_64';
                return { platform: 'linux', arch, artifact_type: arch === 'aarch64' ? 'installer_deb_arm64' : 'installer_deb' };
              }
              // Linux rpm
              if (n.endsWith('.rpm')) {
                const arch = n.includes('arm64') || n.includes('aarch64') ? 'aarch64' : 'x86_64';
                return { platform: 'linux', arch, artifact_type: arch === 'aarch64' ? 'installer_rpm_arm64' : 'installer_rpm' };
              }
              // Linux binary
              if (n.includes('linux') && n.endsWith('.tar.gz')) {
                const arch = n.includes('aarch64') || n.includes('arm64') ? 'aarch64' : 'x86_64';
                return { platform: 'linux', arch, artifact_type: 'binary' };
              }
              return null;
            }

      - name: Sign feed files (Ed25519)
        if: env.FEED_SIGNING_KEY != ''
        env:
          FEED_SIGNING_KEY: ${{ secrets.FEED_SIGNING_KEY }}
        run: |
          # Install signify (lightweight Ed25519 signing tool)
          sudo apt-get update -qq && sudo apt-get install -y -qq signify-openbsd
          # Write the private key to a temporary file
          echo "$FEED_SIGNING_KEY" > /tmp/feed.sec
          # Sign each feed JSON file
          for f in index.json latest.json channels/*.json components/*/latest.json versions/*/*.json; do
            if [ -f "$f" ]; then
              signify-openbsd -S -s /tmp/feed.sec -m "$f" -x "${f}.sig"
            fi
          done
          # Clean up private key
          shred -u /tmp/feed.sec
          echo "Signed $(find . -name '*.sig' | wc -l) feed files"

      - name: Commit and push feed updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No feed changes to commit"
          else
            git commit -m "Update release feed"
            git push
          fi
